# Reverse proxy + TLS termination for the whole app (see docs/adr/0005 update /
# the auth plan): nginx is the sole public entry point. It serves the built
# Vue SPA directly and proxies the backend's own routes through to it, so the
# browser only ever sees one origin — required for the httpOnly session
# cookie, which only round-trips same-origin.

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/selfsigned.crt;
    ssl_certificate_key /etc/nginx/certs/selfsigned.key;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS, with the hostname put in a variable below —
    # resolves "backend" lazily per-request instead of once at nginx startup,
    # so this container doesn't fail to boot if it starts before/without the
    # backend container, and picks up backend restarts without a reload.
    resolver 127.0.0.11 valid=10s;

    # Backend routes (see backend/app.py) — everything else below is static
    # SPA assets.
    location ~ ^/(jo|profile|auth) {
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }
}
