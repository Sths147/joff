services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:5001:5000"
    env_file:
      - ./backend/.env
    environment:
      - JOFF_DATA_DIR=/app/data
      - HF_HOME=/app/model_cache
      - MONGO_URI=mongodb://mongo:27017
    volumes:
      - ./data:/app/data
      - model_cache:/app/model_cache
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  cron:
    image: alpine:3.19
    environment:
      - TZ=Europe/Paris
    volumes:
      - ./cron/crontab:/etc/crontabs/root:ro
    depends_on:
      - backend
    # tzdata isn't in the base image; without it, TZ is silently ignored and crond runs on UTC.
    command: sh -c "apk add --no-cache tzdata && crond -f -l 2"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:5001
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend

volumes:
  model_cache:
  mongo_data:
